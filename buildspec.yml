version: 0.2

phases:
  install:
    commands:
      - curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.6/install.sh | bash
      - export NVM_DIR="$HOME/.nvm"
      - [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
      - nvm install 22
      - nvm use 22
      - node -v
      - npm -v
      - npm install

  pre_build:
    commands:
      - echo "Pre-build phase complete"

  build:
    commands:
      - npm run build

artifacts:
  files:
    - '**/*'
  base-directory: dist